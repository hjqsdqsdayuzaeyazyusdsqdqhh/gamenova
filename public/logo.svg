<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b0b1a"/>
      <stop offset="50%" stop-color="#10102a"/>
      <stop offset="100%" stop-color="#151530"/>
    </linearGradient>
    <linearGradient id="controllerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="50%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="playGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#a5b4fc"/>
    </linearGradient>
    <linearGradient id="innerGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0.1"/>
    </linearGradient>
    <linearGradient id="gripLeft" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="gripRight" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0.3"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="16" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="outerGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="30" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
    <filter id="particleBlur">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <radialGradient id="centerGlow" cx="50%" cy="45%" r="40%">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.15"/>
      <stop offset="60%" stop-color="#6366f1" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#0b0b1a" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="bgClip">
      <rect x="0" y="0" width="512" height="512" rx="80"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="512" height="512" rx="80" fill="url(#bgGrad)"/>

  <!-- Ambient glow -->
  <ellipse cx="256" cy="240" rx="180" ry="160" fill="url(#centerGlow)"/>

  <!-- Subtle grid lines -->
  <g opacity="0.03" stroke="#00d4ff" stroke-width="0.5">
    <line x1="0" y1="128" x2="512" y2="128"/>
    <line x1="0" y1="256" x2="512" y2="256"/>
    <line x1="0" y1="384" x2="512" y2="384"/>
    <line x1="128" y1="0" x2="128" y2="512"/>
    <line x1="256" y1="0" x2="256" y2="512"/>
    <line x1="384" y1="0" x2="384" y2="512"/>
  </g>

  <!-- Floating particles -->
  <g filter="url(#particleBlur)">
    <circle cx="120" cy="100" r="2" fill="#00d4ff" opacity="0.4"/>
    <circle cx="400" cy="90" r="1.5" fill="#8b5cf6" opacity="0.3"/>
    <circle cx="90" cy="350" r="1.8" fill="#6366f1" opacity="0.35"/>
    <circle cx="430" cy="380" r="2.2" fill="#00d4ff" opacity="0.3"/>
    <circle cx="180" cy="420" r="1.2" fill="#a5b4fc" opacity="0.25"/>
    <circle cx="340" cy="440" r="1.6" fill="#8b5cf6" opacity="0.3"/>
    <circle cx="450" cy="200" r="1" fill="#00d4ff" opacity="0.2"/>
    <circle cx="60" cy="220" r="1.4" fill="#6366f1" opacity="0.25"/>
  </g>

  <!-- Outer glow ring -->
  <ellipse cx="256" cy="258" rx="145" ry="130" fill="none" stroke="url(#controllerGrad)" stroke-width="1.5" opacity="0.2" filter="url(#softGlow)"/>

  <!-- Controller body shadow/glow behind -->
  <g filter="url(#outerGlow)">
    <path d="
      M 180 200
      C 180 175, 220 160, 256 160
      C 292 160, 332 175, 332 200
      L 340 210
      C 350 225, 355 245, 355 260
      L 355 280
      C 355 310, 340 335, 320 350
      L 305 360
      C 295 368, 280 365, 275 355
      L 270 340
      C 267 330, 262 320, 256 320
      L 256 320
      C 250 320, 245 330, 242 340
      L 237 355
      C 232 365, 217 368, 207 360
      L 192 350
      C 172 335, 157 310, 157 280
      L 157 260
      C 157 245, 162 225, 172 210
      Z
    " fill="url(#controllerGrad)" opacity="0.3"/>
  </g>

  <!-- Controller body -->
  <g filter="url(#glow)">
    <path d="
      M 180 200
      C 180 175, 220 160, 256 160
      C 292 160, 332 175, 332 200
      L 340 210
      C 350 225, 355 245, 355 260
      L 355 280
      C 355 310, 340 335, 320 350
      L 305 360
      C 295 368, 280 365, 275 355
      L 270 340
      C 267 330, 262 320, 256 320
      L 256 320
      C 250 320, 245 330, 242 340
      L 237 355
      C 232 365, 217 368, 207 360
      L 192 350
      C 172 335, 157 310, 157 280
      L 157 260
      C 157 245, 162 225, 172 210
      Z
    " fill="url(#controllerGrad)" stroke="url(#controllerGrad)" stroke-width="3"/>
  </g>

  <!-- Controller inner fill -->
  <path d="
    M 190 205
    C 190 185, 224 172, 256 172
    C 288 172, 322 185, 322 205
    L 329 214
    C 337 226, 342 244, 342 258
    L 342 278
    C 342 304, 329 326, 312 339
    L 300 347
    C 293 352, 283 350, 279 343
    L 275 330
    C 272 322, 268 314, 256 314
    L 256 314
    C 244 314, 240 322, 237 330
    L 233 343
    C 229 350, 219 352, 212 347
    L 200 339
    C 183 326, 170 304, 170 278
    L 170 258
    C 170 244, 175 226, 183 214
    Z
  " fill="url(#bgGrad)" fill-opacity="0.6" stroke="url(#innerGlow)" stroke-width="1.5"/>

  <!-- Left grip highlight -->
  <path d="
    M 170 260
    C 170 280, 175 300, 185 315
    L 192 340
  " fill="none" stroke="url(#gripLeft)" stroke-width="4" stroke-linecap="round"/>

  <!-- Right grip highlight -->
  <path d="
    M 342 260
    C 342 280, 337 300, 327 315
    L 320 340
  " fill="none" stroke="url(#gripRight)" stroke-width="4" stroke-linecap="round"/>

  <!-- Top edge highlight -->
  <path d="
    M 200 178
    C 220 165, 292 165, 312 178
  " fill="none" stroke="#00d4ff" stroke-width="2" stroke-linecap="round" opacity="0.5"/>

  <!-- D-pad (left side) -->
  <g transform="translate(210, 245)">
    <rect x="-3" y="-12" width="6" height="24" rx="1.5" fill="url(#controllerGrad)" opacity="0.7"/>
    <rect x="-12" y="-3" width="24" height="6" rx="1.5" fill="url(#controllerGrad)" opacity="0.7"/>
  </g>

  <!-- Right buttons (ABXY style) -->
  <g transform="translate(302, 245)">
    <circle cx="0" cy="-8" r="3.5" fill="url(#controllerGrad)" opacity="0.7"/>
    <circle cx="0" cy="8" r="3.5" fill="url(#controllerGrad)" opacity="0.7"/>
    <circle cx="-8" cy="0" r="3.5" fill="url(#controllerGrad)" opacity="0.7"/>
    <circle cx="8" cy="0" r="3.5" fill="url(#controllerGrad)" opacity="0.7"/>
  </g>

  <!-- Center play button -->
  <g filter="url(#glow)">
    <polygon points="236,240 236,272 264,256" fill="url(#playGrad)" stroke="#ffffff" stroke-width="1.5" opacity="0.95"/>
  </g>

  <!-- Inner reflection on controller top -->
  <ellipse cx="256" cy="185" rx="50" ry="8" fill="#ffffff" opacity="0.04"/>

  <!-- Small highlight glint on top curve -->
  <ellipse cx="256" cy="166" rx="20" ry="3" fill="#00d4ff" opacity="0.25" filter="url(#softGlow)"/>

  <!-- Bottom glow reflection -->
  <ellipse cx="256" cy="420" rx="80" ry="6" fill="#6366f1" opacity="0.08" filter="url(#softGlow)"/>
</svg>
